<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>roblox.iran - Private Server Shortener</title>
  <style>
    :root { --bg: #0a84ff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a84ff, #003399);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 3rem; text-align:center; margin-bottom: 8px; }
    .subtitle { text-align:center; font-size: 1.2rem; opacity: 0.9; }
    .tabs { display:flex; gap:8px; justify-content:center; margin:30px 0; flex-wrap:wrap; }
    .tab {
      padding: 10px 24px;
      border-radius: 50px;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
    }
    .tab.active { background: #000; }
    .card {
      background: rgba(0,0,0,0.75);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: white;
      font-size: 16px;
      margin: 12px 0;
    }
    .row { display: flex; gap: 12px; }
    button {
      padding: 16px 28px;
      border: none;
      border-radius: 12px;
      background: #0a84ff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .link-item {
      background: rgba(0,0,0,0.6);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .footer { text-align:center; margin-top:60px; opacity:0.8; font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>roblox.iran</h1>
    <p class="subtitle">Got a long Roblox link? Paste it and get a clean short link.</p>

    <div class="tabs">
      <div class="tab active">Shorten</div>
      <div class="tab">API</div>
      <div class="tab">Custom</div>
    </div>

    <div class="card">
      <div style="display:flex; background:#000; border-radius:12px; padding:4px;">
        <div style="flex:1; padding:12px 16px; background:#000; border-radius:10px;">roblox.iran</div>
      </div>

      <input type="text" id="longUrl" placeholder="Paste your long Roblox URL here...">
      
      <div class="row">
        <input type="text" id="customPath" placeholder="private-server-link or games-xxx" style="flex:1;">
        <button onclick="createLink()">Create Link</button>
      </div>
    </div>

    <div class="card">
      <strong>My Links</strong>
      <div id="linksList"></div>
    </div>
  </div>

  <div class="footer">
    © 2026 roblox.iran • Not affiliated with Roblox Corporation
  </div>

  <script>
    let links = JSON.parse(localStorage.getItem('links')) || [];

    function createLink() {
      const url = document.getElementById('longUrl').value.trim();
      let path = document.getElementById('customPath').value.trim() || Math.random().toString(36).substring(2,12);

      if (!url) return alert("Enter a URL");

      const short = `https://roblox.iran/${path}`;

      links.unshift({ short, original: url, path });
      localStorage.setItem('links', JSON.stringify(links));
      renderLinks();

      navigator.clipboard.writeText(short);
      alert(`✅ Link created!\n${short}`);
    }

    function renderLinks() {
      const div = document.getElementById('linksList');
      div.innerHTML = links.map(l => `
        <div class="link-item">
          <div>
            <strong>${l.short}</strong><br>
            <small>${l.original.substring(0,70)}...</small>
          </div>
          <button onclick="copy('${l.short}')" style="background:none;border:none;color:#0af;">Copy</button>
        </div>
      `).join('');
    }

    function copy(text) { navigator.clipboard.writeText(text); alert("Copied!"); }
    renderLinks();
  </script>
</body>
</html>
